name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # @nuxtjs/supabase requires these at build time. CI uses dummy values
      # since the build only validates compilation, not runtime connectivity.
      SUPABASE_URL: https://smisyeccpfwnhdapbduy.supabase.co
      SUPABASE_KEY: sb_publishable_75ufHXZ9GMpNg8ZbuH9PVA_74S2NcoV

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test:run

      - name: Build
        run: pnpm exec nuxt build
